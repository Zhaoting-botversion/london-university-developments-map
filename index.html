<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London University Developments Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1117;
    --panel: #181c27;
    --panel2: #1e2335;
    --border: #2a3050;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #e8eaf0;
    --muted: #7a82a0;
    --ucl: #500778;
    --kcl: #d5202e;
    --ic: #003d8f;
    --csm: #2e7d32;
    --lcc: #bf6900;
    --active-tab: var(--gold);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 10;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* University tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .tab {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: var(--panel2);
    color: var(--muted);
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: #fff; border-color: currentColor; }
  .tab[data-uni="UCL"].active    { color: #c78fff; border-color: #c78fff; background: rgba(80,7,120,0.25); }
  .tab[data-uni="KCL"].active    { color: #ff7a85; border-color: #ff7a85; background: rgba(213,32,46,0.2); }
  .tab[data-uni="IC"].active     { color: #6faeff; border-color: #6faeff; background: rgba(0,61,143,0.25); }
  .tab[data-uni="CSM"].active    { color: #81c784; border-color: #81c784; background: rgba(46,125,50,0.2); }
  .tab[data-uni="LCC"].active    { color: #ffb74d; border-color: #ffb74d; background: rgba(191,105,0,0.2); }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--gold-light);
  }
  .count-badge {
    display: inline-block;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 9px;
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: 8px;
    vertical-align: middle;
  }

  .dev-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  .dev-list::-webkit-scrollbar { width: 4px; }
  .dev-list::-webkit-scrollbar-track { background: transparent; }
  .dev-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .dev-item {
    padding: 10px 18px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid rgba(42,48,80,0.4);
  }
  .dev-item:hover { background: var(--panel2); }
  .dev-item.active { background: var(--panel2); }
  .dev-item-name {
    font-size: 0.83rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .dev-item-meta {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .time-pill {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 0.68rem;
    font-weight: 500;
  }
  .price-tag {
    color: #81c784;
    font-weight: 500;
  }

  /* Map */
  #map {
    flex: 1;
    position: relative;
  }
  #map-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--panel2);
    z-index: 2;
    text-align: center;
    padding: 40px;
  }
  .setup-icon { font-size: 3rem; margin-bottom: 16px; }
  .setup-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    margin-bottom: 12px;
  }
  .setup-text {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 480px;
  }
  .api-input-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    width: 100%;
    max-width: 480px;
  }
  .api-input {
    flex: 1;
    background: var(--panel);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--gold); }
  .api-input::placeholder { color: var(--muted); }
  .api-btn {
    background: var(--gold);
    color: #0f1117;
    border: none;
    padding: 9px 18px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .api-btn:hover { background: var(--gold-light); }
  .setup-steps {
    margin-top: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    text-align: left;
    width: 100%;
    max-width: 480px;
  }
  .setup-steps h3 {
    font-size: 0.8rem;
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .step {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .step-num {
    background: var(--border);
    color: var(--text);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
    font-weight: 600;
  }
  .step a { color: var(--gold); text-decoration: none; }
  .step a:hover { text-decoration: underline; }

  /* Info window override */
  .gm-style .gm-style-iw-c {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    padding: 0 !important;
    max-width: 280px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  }
  .gm-style .gm-style-iw-d { overflow: hidden !important; }
  .gm-style .gm-style-iw-tc::after { background: var(--panel) !important; }
  .gm-style button.gm-ui-hover-effect { top: 4px !important; right: 4px !important; }

  .iw-content {
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
  }
  .iw-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--gold-light);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .iw-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 0.76rem;
    color: var(--muted);
  }
  .iw-row strong { color: var(--text); min-width: 60px; }
  .iw-time-large {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 8px 0;
    padding: 8px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
  }
  .iw-time-num {
    font-size: 1.6rem;
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    line-height: 1;
  }
  .iw-time-label { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }
  .iw-section-label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 10px 0 5px;
    font-weight: 600;
  }
  .transport-steps {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .transport-step {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    color: var(--text);
    background: rgba(255,255,255,0.05);
    border-radius: 5px;
    padding: 3px 7px;
    white-space: nowrap;
  }
  .t-icon { font-size: 0.85rem; }
  .t-label { font-size: 0.7rem; }
  .transport-arrow { color: var(--muted); font-size: 0.7rem; padding: 0 1px; }
  .iw-divider { height: 1px; background: var(--border); margin: 8px 0; }
</style>
</head>

let map, activeUni = "UCL", markers = [], uniMarker = null, infoWindow = null;
let mapLoaded = false;

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar(uniKey) {
  const uni = UNIVERSITIES[uniKey];
  document.getElementById('sidebar-title').textContent = uni.name;
  document.getElementById('count-badge').textContent = uni.developments.length + ' developments';

  const list = document.getElementById('dev-list');
  list.innerHTML = '';

  const sorted = [...uni.developments].sort((a,b) => a.time - b.time);
  sorted.forEach((dev, i) => {
    const div = document.createElement('div');
    div.className = 'dev-item';
    div.style.borderLeftColor = uni.color;
    div.innerHTML = `
      <div class="dev-item-name">${dev.name}</div>
      <div class="dev-item-meta">
        <span class="time-pill">⏱ ${dev.time} min</span>
        <span>${dev.area}</span>
        ${dev.price !== '询价' ? `<span class="price-tag">${dev.price}</span>` : '<span style="color:#7a82a0">价格待询</span>'}
      </div>
    `;
    div.addEventListener('click', () => {
      if (!mapLoaded) return;
      // Find matching marker
      const idx = sorted.findIndex(d => d.name === dev.name);
      const marker = markers[idx];
      if (marker) {
        map.panTo(marker.getPosition());
        map.setZoom(15);
        showInfoWindow(marker, dev, uniKey);
        // Highlight sidebar item
        document.querySelectorAll('.dev-item').forEach(el => el.classList.remove('active'));
        div.classList.add('active');
      }
    });
    list.appendChild(div);
  });
}

function loadMap() {
  const key = "AIzaSyBOmaVXpkaKOozddTe-b9OLf8sbY0H5rg0";
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=initMap`;
  script.async = true;
  document.head.appendChild(script);
}
loadMap();

window.initMap = function() {
  mapLoaded = true;
  document.getElementById('map-placeholder').style.display = 'none';

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 51.505, lng: -0.14 },
    zoom: 12,
    styles: darkMapStyle(),
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP }
  });

  infoWindow = new google.maps.InfoWindow({ maxWidth: 280 });
  renderUniOnMap(activeUni);
};

function renderUniOnMap(uniKey) {
  // Clear old markers
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (uniMarker) uniMarker.setMap(null);
  if (infoWindow) infoWindow.close();

  const uni = UNIVERSITIES[uniKey];

  // University marker
  uniMarker = new google.maps.Marker({
    position: { lat: uni.lat, lng: uni.lng },
    map,
    title: uni.name,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 18,
      fillColor: uni.color,
      fillOpacity: 1,
      strokeColor: '#ffffff',
      strokeWeight: 3,
    },
    label: { text: '🏛', fontSize: '14px' },
    zIndex: 1000,
  });
  uniMarker.addListener('click', () => {
    infoWindow.setContent(`<div class="iw-content"><div class="iw-name">${uni.name}</div><div class="iw-row" style="color:#aaa;font-size:0.8rem;">University campus</div></div>`);
    infoWindow.open(map, uniMarker);
  });

  const sorted = [...uni.developments].sort((a,b) => a.time - b.time);
  sorted.forEach((dev, i) => {
    const color = timeColor(dev.time);
    const marker = new google.maps.Marker({
      position: { lat: dev.lat, lng: dev.lng },
      map,
      title: dev.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: color,
        fillOpacity: 0.92,
        strokeColor: '#ffffff',
        strokeWeight: 1.5,
      },
      zIndex: 100 - dev.time,
    });

    marker.addListener('click', () => {
      showInfoWindow(marker, dev, uniKey);
      // Highlight sidebar item
      const items = document.querySelectorAll('.dev-item');
      items.forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });
    });

    markers.push(marker);
  });

  // Pan to university
  map.panTo({ lat: uni.lat, lng: uni.lng });
  map.setZoom(12);
}

function parseTransportSteps(commute) {
  // Detect mode icons from keywords
  function modeIcon(text) {
    const t = text.toLowerCase();
    if (t.includes('步行') || t.includes('walk')) return { icon: '🚶', label: 'Walk', color: '#81c784' };
    if (t.includes('bus') || t.includes('路')) return { icon: '🚌', label: 'Bus', color: '#ffb74d' };
    if (t.includes('elizabeth') || t.includes('crossrail')) return { icon: '🟣', label: 'Elizabeth', color: '#9c27b0' };
    if (t.includes('northern')) return { icon: '⚫', label: 'Northern', color: '#424242' };
    if (t.includes('victoria')) return { icon: '🔵', label: 'Victoria', color: '#1565c0' };
    if (t.includes('piccadilly')) return { icon: '🔵', label: 'Piccadilly', color: '#283593' };
    if (t.includes('central')) return { icon: '🔴', label: 'Central', color: '#c62828' };
    if (t.includes('jubilee')) return { icon: '⚫', label: 'Jubilee', color: '#546e7a' };
    if (t.includes('district')) return { icon: '🟢', label: 'District', color: '#2e7d32' };
    if (t.includes('circle')) return { icon: '🟡', label: 'Circle', color: '#f9a825' };
    if (t.includes('metropolitan') || t.includes('met')) return { icon: '🟣', label: 'Metropolitan', color: '#6a1b9a' };
    if (t.includes('hammersmith') || t.includes('h&c')) return { icon: '🩷', label: 'H&C', color: '#e91e8c' };
    if (t.includes('overground')) return { icon: '🟠', label: 'Overground', color: '#e65100' };
    if (t.includes('thameslink') || t.includes('national rail')) return { icon: '🚂', label: 'Rail', color: '#795548' };
    if (t.includes('bakerloo')) return { icon: '🟤', label: 'Bakerloo', color: '#795548' };
    return { icon: '🚇', label: 'Tube', color: '#607d8b' };
  }

  const isWalking = commute.toLowerCase().includes('步行') || commute.toLowerCase() === 'walking';
  if (isWalking) {
    return `<div class="transport-steps"><div class="transport-step"><span class="t-icon">🚶</span><span class="t-label" style="color:#81c784">Walking only</span></div></div>`;
  }

  // Split by → or -> or comma
  const parts = commute.split(/→|->|，|,(?![^(]*\))/).map(s => s.trim()).filter(Boolean);
  
  let stepsHtml = '<div class="transport-steps">';
  parts.forEach((part, i) => {
    const m = modeIcon(part);
    // Check if it looks like a station name (has capital letters, no line keywords)
    const isStation = !part.toLowerCase().match(/line|road|circle|district|northern|victoria|jubilee|central|metropolitan|elizabeth|piccadilly|bakerloo|hammersmith|overground|thameslink|步行|walk|bus|路/);
    stepsHtml += `<div class="transport-step">
      <span class="t-icon">${m.icon}</span>
      <span class="t-label">${part}</span>
    </div>`;
    if (i < parts.length - 1) stepsHtml += `<div class="transport-arrow">→</div>`;
  });
  stepsHtml += '</div>';
  return stepsHtml;
}

function showInfoWindow(marker, dev, uniKey) {
  const uni = UNIVERSITIES[uniKey];
  const color = timeColor(dev.time);
  const transportHtml = parseTransportSteps(dev.commute);
  const devLabel = dev.developer ? `<div class="iw-row"><strong>Developer:</strong>${dev.developer}</div>` : '';
  const html = `
    <div class="iw-content">
      <div class="iw-name">${dev.name}</div>
      <div class="iw-time-large">
        <div class="iw-time-num" style="color:${color}">${dev.time}</div>
        <div class="iw-time-label">minutes to<br><strong style="color:${uni.color}">${uni.name.split('(')[0].trim()}</strong></div>
      </div>
      <div class="iw-section-label">🗺 COMMUTE ROUTE</div>
      ${transportHtml}
      <div class="iw-divider"></div>
      <div class="iw-row"><strong>Area:</strong>${dev.area}</div>
      <div class="iw-row"><strong>Address:</strong>${dev.address}</div>
      ${devLabel}
      <div class="iw-row"><strong>Price:</strong><span style="color:#81c784">${dev.price}</span></div>
      <div class="iw-row"><strong>Beds:</strong>${dev.beds}</div>
      <div class="iw-row"><strong>Status:</strong>${dev.ready}</div>
    </div>
  `;
  infoWindow.setContent(html);
  infoWindow.open(map, marker);
}

function timeColor(mins) {
  if (mins <= 10) return '#4caf50';
  if (mins <= 15) return '#8bc34a';
  if (mins <= 20) return '#cddc39';
  if (mins <= 25) return '#ffc107';
  if (mins <= 30) return '#ff9800';
  return '#f44336';
}
